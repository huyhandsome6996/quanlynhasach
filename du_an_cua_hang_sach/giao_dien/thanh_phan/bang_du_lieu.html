<!-- Khu vực nội dung chính -->
<main class="noi_dung_chinh">
    <!-- Thông báo -->
    <div id="thong_bao" class="thong_bao an_di"></div>

    <!-- Khu vực thống kê (ẩn mặc định) -->
    <div id="khu_vuc_thong_ke" class="khu_vuc_thong_ke an_di">
        <h3>Thống kê cửa hàng</h3>
        <div class="bang_thong_ke" id="bang_thong_ke">
            <!-- Sẽ được JavaScript render vào đây -->
        </div>
        <button class="nut nut_phu" onclick="document.getElementById('khu_vuc_thong_ke').classList.add('an_di')">Đóng thống kê</button>
    </div>

    <!-- Bảng hiển thị dữ liệu -->
    <div class="bang_du_lieu">
        <table id="bang_san_pham">
            <thead>
                <tr>
                    <th>Mã số</th>
                    <th>Loại hàng</th>
                    <th>Tên sản phẩm</th>
                    <th>Giá cơ bản</th>
                    <th>Giá bán</th>
                    <th>Tồn kho</th>
                    <th>Chi tiết</th>
                    <th>Thao tác</th>
                </tr>
            </thead>
            <tbody id="than_bang">
                <tr>
                    <td colspan="8" class="dang_tai">Đang tải dữ liệu...</td>
                </tr>
            </tbody>
        </table>
    </div>
</main>
