<!-- ====================================================================
     bang_du_lieu.html — Khu vực nội dung chính: thông báo + thống kê + bảng sản phẩm.
     Được chèn vào trang_chu.html qua lenh `include`.
     ==================================================================== -->

<!-- <main>: Thẻ HTML5 ngữ nghĩa cho nội dung CHÍNH của trang (chỉ có 1/main). -->
<main class="noi_dung_chinh" id="noi_dung_chinh">

    <!-- Khu vực thông báo — [JS HOOK] Gọi `tuong_tac.js / hien_thi_thong_bao()` sẽ đổi nội dung và class (màu xanh/đỏ) của thẻ này.
         role="status" aria-live="polite": screen reader đọc thông báo khi nó thay đổi. -->
    <div id="thong_bao" class="thong_bao an_di" role="status" aria-live="polite"></div>

    <!-- <section>: Khu vực có chủ đề riêng trong trang.
         class="an_di": ẩn mặc định (display:none), JS sẽ bỏ class này khi bấm "Thống kê". -->
    <section id="khu_vuc_thong_ke" class="khu_vuc_thong_ke an_di" aria-label="Thống kê cửa hàng">
        <h3>Thống kê cửa hàng</h3>
        <div class="bang_thong_ke" id="bang_thong_ke">
            <!-- [JS HOOK] Được vẽ HTML bởi `goi_du_lieu.js / lay_thong_ke()` -> Lấy dữ liệu từ API `xu_ly_yeu_cau/tim_kiem_thong_ke.py / lay_thong_ke()`. -->
        </div>
        <!-- onclick="...": JS nội tuyến — bấm nút thì thêm class an_di để ẩn đi. -->
        <button class="nut nut_phu" type="button" onclick="document.getElementById('khu_vuc_thong_ke').classList.add('an_di')">Đóng thống kê</button>
    </section>

    <!-- Bảng hiển thị dữ liệu sản phẩm. -->
    <div class="bang_du_lieu">
        <!-- <table>: Bảng HTML — id để JS truy cập.
             <thead>: phần đầu bảng (header).
             <tr>: một hàng.
             <th scope="col">: ô tiêu đề cột (table header). scope="col" báo cho screen reader
             biết đây là tiêu đề CỘT (không phải hàng). -->
        <table id="bang_san_pham">
            <thead>
                <tr>
                    <th scope="col">Mã số</th>
                    <th scope="col">Loại hàng</th>
                    <th scope="col">Tên sản phẩm</th>
                    <th scope="col">Giá cơ bản</th>
                    <th scope="col">Giá bán</th>
                    <th scope="col">Tồn kho</th>
                    <th scope="col">Chi tiết</th>
                    <th scope="col">Thao tác</th>
                </tr>
            </thead>
            <!-- <tbody>: Phần thân bảng — chứa các hàng dữ liệu thực tế.
                 id="than_bang": [JS HOOK] Được vẽ HTML bởi `tuong_tac.js / ve_bang()` -> Lấy dữ liệu từ `goi_du_lieu.js / lay_danh_sach()` -> API `xu_ly_yeu_cau/san_pham.py / lay_danh_sach()`. -->
            <tbody id="than_bang">
                <tr>
                    <!-- colspan="8": Ô này trải dài qua 8 cột (vì đang loading chưa có dữ liệu). -->
                    <td colspan="8" class="dang_tai">Đang tải dữ liệu…</td>
                </tr>
            </tbody>
        </table>
    </div>
</main>
