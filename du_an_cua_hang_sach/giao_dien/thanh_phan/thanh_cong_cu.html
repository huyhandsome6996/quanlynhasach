<!-- ====================================================================
     thanh_cong_cu.html — Thanh công cụ: tìm kiếm + sắp xếp + các nút chức năng.
     Được chèn vào trang_chu.html qua lenh `include`.
     ==================================================================== -->

<!-- <nav>: Thẻ HTML5 ngữ nghĩa cho khu vực điều hướng (navigation). -->
<nav class="thanh_cong_cu" aria-label="Thanh công cụ">
    <div class="noi_dung_cong_cu">

        <!-- ============== Ô TÌM KIẾM NÂNG CAO ============== -->
        <!-- role="search": đánh dấu cho screen reader biết đây là form tìm kiếm. -->
        <div class="nhom_tim_kiem" role="search">

            <!-- <label for="..." class="visually-hidden">: Nhãn ẨN khỏi giao diện
                 (chỉ screen reader đọc) — vẫn đảm bảo accessibility. -->
            <label for="chon_tieu_chi_tim" class="visually-hidden" style="position:absolute;width:1px;height:1px;overflow:hidden;clip:rect(0 0 0 0);">Tiêu chí tìm kiếm</label>

            <!-- <select>: Danh sách thả xuống — người dùng chọn 1 trong các option. -->
            <select id="chon_tieu_chi_tim" class="tim_tieu_chi" aria-label="Tiêu chí tìm kiếm">
                <option value="ten">Theo tên</option>      <!-- <option>: 1 lựa chọn trong select. -->
                <option value="ma">Theo mã số</option>
                <option value="loai">Theo loại hàng</option>
            </select>

            <label for="o_tim_kiem" class="visually-hidden" style="position:absolute;width:1px;height:1px;overflow:hidden;clip:rect(0 0 0 0);">Từ khoá tìm kiếm</label>
            <!-- <input type="text">: Ô nhập từ khóa tìm kiếm. -->
            <input type="text" id="o_tim_kiem" placeholder="Tìm kiếm sản phẩm…" aria-label="Từ khoá tìm kiếm" />

            <!-- <button type="button">: Nút bấm thông thường (không submit form).
                 id="nut_tim_kiem": JS gắn sự kiện click. -->
            <button id="nut_tim_kiem" class="nut nut_chinh" type="button">Tìm kiếm</button>
        </div>

        <!-- ============== NHÓM SẮP XẾP ============== -->
        <div class="nhom_sap_xep">
            <label for="chon_sap_xep">Sắp xếp:</label>
            <select id="chon_sap_xep" aria-label="Chọn trường sắp xếp">
                <option value="gia_ban">Giá bán</option>
                <option value="ten_san_pham">Tên sản phẩm</option>
                <option value="ton_kho">Tồn kho</option>
            </select>
            <button id="nut_sap_xep" class="nut nut_phu" type="button">Sắp xếp</button>
        </div>

        <!-- ============== NHÓM NÚT CHỨC NĂNG ============== -->
        <div class="nhom_chuc_nang">
            <button id="nut_lam_moi" class="nut nut_lam_moi" type="button">Làm mới</button>
            <button id="nut_thong_ke" class="nut nut_thong_ke" type="button">Thống kê</button>
            <!-- Nút Giỏ hàng có badge số lượng bên trong (id="so_gio_hang"). -->
            <button id="nut_gio_hang" class="nut nut_gio_hang" type="button" aria-label="Giỏ hàng">
                Giỏ hàng <span id="so_gio_hang" class="dem_gio" aria-label="Số mặt hàng trong giỏ">0</span>
            </button>
            <!-- title="...": tooltip khi di chuột, aria-label: cho screen reader. -->
            <button id="nut_hoan_tac" class="nut nut_hoan_tac" type="button" title="Hoàn tác (Undo)" aria-label="Hoàn tác">↩ Undo</button>
            <button id="nut_lam_lai" class="nut nut_lam_lai" type="button" title="Làm lại (Redo)" aria-label="Làm lại">↪ Redo</button>
            <button id="nut_mo_form" class="nut nut_them" type="button">+ Thêm sản phẩm</button>
        </div>
    </div>
</nav>
