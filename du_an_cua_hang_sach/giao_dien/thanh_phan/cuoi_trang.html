     cuoi_trang.html — Hộp thoại Giỏ hàng (modal) + Footer copyright.
     Được chèn vào trang_chu.html qua lenh `include`.
     ==================================================================== -->

<!-- ============== HỘP THOẠI GIỎ HÀNG (MODAL) ============== -->
<!-- role="dialog" aria-modal="true": modal che các phần khác.
     class="hop_thoai an_di": ẩn mặc định, JS bỏ an_di khi bấm nút Giỏ hàng. -->
<div id="hop_gio_hang" class="hop_thoai an_di" role="dialog" aria-modal="true" aria-labelledby="tieu_de_gio_hang">
    <div class="noi_dung_hop_thoai">
        <div class="tieu_de_hop_thoai">
            <h2 id="tieu_de_gio_hang">Giỏ hàng</h2>
            <!-- onclick nội tuyến: bấm nút × thì thêm class an_di để ẩn modal. -->
            <button class="nut_dong" type="button" aria-label="Đóng giỏ hàng" onclick="document.getElementById('hop_gio_hang').classList.add('an_di')">&times;</button>
        </div>
        <div id="noi_dung_gio_hang" class="noi_dung_gio">
            <!-- JS sẽ chèn bảng giỏ hàng vào đây khi người dùng bấm nút Giỏ hàng. -->
        </div>
    </div>
</div>

<!-- ============== CHÂN TRANG ============== -->
<!-- <footer>: Thẻ HTML5 ngữ nghĩa cho phần chân trang (copyright, liên hệ...). -->
<footer class="chan_trang">
    <p>Hệ thống Quản lý Cửa hàng Sách &copy; 2025 — Môn Lập trình Nâng cao</p>
    <!-- &copy;: Ký tự bản quyền © (HTML entity). -->
</footer>
