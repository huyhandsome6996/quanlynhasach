<!DOCTYPE html>
<!-- ↑ Thẻ DOCTYPE khai báo đây là tài liệu HTML5 (phiên bản mới nhất).
     Phải là dòng đầu tiên của mọi file HTML, không có thẻ đóng. -->

<!-- Thẻ <html> là thẻ GỐC bao quanh toàn bộ nội dung trang.
     Thuộc tính lang="vi" khai báo ngôn ngữ tiếng Việt — giúp:
       - Trình đọc màn hình (screen reader) đọc đúng giọng.
       - Trình duyệt dịch tự động.
       - Công cụ tìm kiếm phân loại chính xác. -->
<html lang="vi">

<!-- Thẻ <head> chứa THÔNG TIN CHÍNH SÁCH của trang (KHÔNG hiển thị lên màn hình):
     - Tiêu đề trang (hiện trên tab trình duyệt).
     - Encoding ký tự, viewport responsive.
     - Link tới file CSS/JS ngoài.
     - Meta SEO, theme color. -->
<head>

    <!-- <meta charset="UTF-8">: Khai báo bảng mã UTF-8 để hiển thị đúng tiếng Việt
         (có dấu) — nếu không có, chữ "Quản lý" sẽ thành "Qu�?n l�". -->
    <meta charset="UTF-8">

    <!-- <meta name="viewport">: Thiết kế web RESPONSIVE — trang tự co giãn
         theo màn hình điện thoại / máy tính.
         width=device-width: chiều rộng = chiều rộng thiết bị.
         initial-scale=1.0: không phóng to/thu nhỏ khi mới mở. -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- <meta name="description">: Mô tả ngắn cho công cụ tìm kiếm (Google).
         Xuất hiện dưới tiêu đề trong kết quả tìm kiếm. -->
    <meta name="description" content="Hệ thống Quản lý Cửa hàng Sách — đồ án môn Lập trình Nâng cao. Sử dụng DoublyLinkedList, MergeSort, Stack (Undo/Redo) và Queue (Giỏ hàng).">

    <!-- <meta name="theme-color">: Màu thanh địa chỉ trên điện thoại
         (Chrome mobile, Safari iOS) — tạo cảm giác như app native. -->
    <meta name="theme-color" content="#047857">

    <!-- Thẻ <title>: Tiêu đề trang, hiện trên TAB trình duyệt
         và là tên bookmark khi người dùng lưu trang. -->
    <title>Hệ thống Quản lý Cửa hàng Sách</title>

    <!-- Dòng dưới: lenh `load static` cua Django template
         de dung duoc the `static` ben duoi khi tro toi file CSS/JS. -->
    {% load static %}

    <!-- <link rel="preconnect">: Gợi ý trình duyệt thiết lập sẵn
         kết nối DNS + TLS tới fonts.googleapis.com → tải font nhanh hơn. -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <!-- <link rel="stylesheet">: Nạp file CSS từ Google Fonts
         (font Inter với 4 độ đậm 400/500/600/700). -->
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap">

    <!-- Dong duoi: nap file CSS noi bo cua du an (tep_tinh/hinh_thuc/trang_tri.css).
         Lenh `static` se tu them tien to '/tep_tinh/' (theo STATIC_URL trong settings). -->
    <link rel="stylesheet" href="{% static 'hinh_thuc/trang_tri.css' %}">
</head>

<!-- Thẻ <body> chứa TOÀN BỘ nội dung HIỂN THỊ lên màn hình. -->
<body>
    <!-- Đường tắt cho người dùng bàn phím / screen reader:
         Mặc định ẩn khỏi tầm nhìn (position:absolute; left:-9999px),
         nhưng người dùng tab phím sẽ focus vào đây để bỏ qua menu tới nội dung chính. -->
    <a href="#noi_dung_chinh" class="duong_tat" style="position:absolute;left:-9999px;top:auto;width:1px;height:1px;overflow:hidden;">Bỏ qua tới nội dung chính</a>

    <!-- Lenh `include` cua Django: CHEN file HTML khac vao vi tri nay.
         'thanh_phan/dau_trang.html' chứa header (tiêu đề + thông tin người dùng). -->
    {% include 'thanh_phan/dau_trang.html' %}

    <!-- Chèn thanh công cụ: ô tìm kiếm, nút sắp xếp, nút thêm/giỏ hàng/undo/redo. -->
    {% include 'thanh_phan/thanh_cong_cu.html' %}

    <!-- Chèn khu vực bảng dữ liệu chính (hiển thị danh sách sản phẩm). -->
    {% include 'thanh_phan/bang_du_lieu.html' %}

    <!-- Chèn biểu mẫu (modal) thêm/sửa sản phẩm — ẩn mặc định, chỉ hiện khi bấm nút. -->
    {% include 'thanh_phan/bieu_mau_them.html' %}

    <!-- Chèn phần chân trang: hộp thoại giỏ hàng + footer copyright. -->
    {% include 'thanh_phan/cuoi_trang.html' %}

    <!-- <script src=...>: Nạp file JavaScript.
         PHẢI đặt cuối <body> để HTML tải xong trước khi JS chạy
         (tránh lỗi "element is null" khi JS cố truy cập phần tử chưa kịp render). -->

    <!-- goi_du_lieu.js: các hàm gọi API (fetch) tới backend Django. -->
    <script src="{% static 'ma_lenh/goi_du_lieu.js' %}"></script>

    <!-- tuong_tac.js: các hàm xử lý UI (bắt sự kiện click, vẽ bảng, hiển thị thông báo). -->
    <script src="{% static 'ma_lenh/tuong_tac.js' %}"></script>
</body>
</html>
